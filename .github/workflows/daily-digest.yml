name: daily-digest

on:
  schedule:
    # 06:00 UTC daily (just after midnight US Pacific, early afternoon Europe)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      since:
        description: "Window (e.g. 24h, 7d, 2w, or 'all' for a genesis snapshot)"
        required: false
        default: "24h"
      only:
        description: "Comma-separated source ids to restrict the crawl (optional)"
        required: false
        default: ""
      date:
        description: "Output filename stem (defaults to today's date; use 'genesis' for the first all-content snapshot)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Crawl sources
        run: |
          ARGS=(--since "${{ github.event.inputs.since || '24h' }}")
          if [ -n "${{ github.event.inputs.only }}" ]; then
            ARGS+=(--only "${{ github.event.inputs.only }}")
          fi
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS+=(--date "${{ github.event.inputs.date }}")
          fi
          python scripts/crawl.py "${ARGS[@]}"

      - name: Render Markdown digest
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python scripts/render_digest.py --date "${{ github.event.inputs.date }}"
          else
            python scripts/render_digest.py
          fi

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/digests digests data/resolved 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no digest changes"
            exit 0
          fi
          STEM="${{ github.event.inputs.date }}"
          if [ -z "$STEM" ]; then STEM=$(date -u +%Y-%m-%d); fi
          git commit -m "chore(digest): ${STEM}"
          git push
