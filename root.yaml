# root.yaml
# Source metadata catalog for crawling industry patterns and news from
# specialized technical education platforms covering MLOps, stream processing,
# database internals, and analytics engineering.
#
# Extracted from the survey: "High-Scale System Architectures, Stream
# Processing, and Operational Machine Learning".
#
# Field reference:
#   id            stable slug used as crawler key
#   name          display name of the source
#   type          youtube | podcast | academic | community
#   host          primary creator(s) / owning organization
#   url           canonical landing page (verify before automated fetch)
#   handle        platform handle (e.g. @handle for YouTube)
#   feed          RSS/Atom feed pattern when known; null if must be resolved
#                 by the crawler (e.g. YouTube channel_id lookup)
#   tier          1=Core Systems, 2=Infrastructure/Protocols,
#                 3=Big Data/Analytics, 4=Career/Interview
#   category      thematic grouping from the survey
#   focus         one-line technical focus
#   topics        keyword list to filter / tag fetched items
#   verified      whether the URL/handle has been human-verified
#                 (false = treat as candidate, crawler should confirm)

version: 1
updated: 2026-05-21

defaults:
  youtube_feed_pattern: "https://www.youtube.com/feeds/videos.xml?channel_id={channel_id}"
  youtube_handle_url: "https://www.youtube.com/{handle}"
  crawl_interval_days: 7

categories:
  - id: mlops_feature_stores
    label: "Enterprise ML Platforms & Feature Stores"
  - id: stream_processing
    label: "Stream Processing, Event Brokerage & Real-Time"
  - id: db_internals
    label: "Database Internals, Storage Engines & Consensus"
  - id: big_data_analytics
    label: "Big Data Systems, Analytics Engineering & Foundations"
  - id: career_interview
    label: "Career Development & Interview Strategy"
  - id: cs_foundations
    label: "CS Foundations, Visualization & Productivity"

