# ---------------------------------------------------------------
# Crawl strategy notes
# ---------------------------------------------------------------
crawl_notes:
  - "For YouTube sources where `feed: null`, the crawler must first resolve
     the channel_id from the handle (HTML scrape of /@handle for
     `externalId` or use YouTube Data API channels.list?forHandle=) and
     then construct the feed via `youtube_feed_pattern`."
  - "Entries marked `verified: false` are derived from the survey text and
     widely-used handles; confirm the canonical URL on first fetch before
     trusting downstream automation."
  - "Sources without a URL/handle (e.g. Practically Perfect PL/SQL,
     DevMastersDb, Theoretical Computer Science, Data with Baara,
     nullQueries, E-Learning Bridge) require manual resolution before
     adding to the active crawl set."
  - "Podcasts (Plumbers of Data Science) may also publish via dedicated
     RSS feeds outside YouTube; consider adding those endpoints once
     resolved."
